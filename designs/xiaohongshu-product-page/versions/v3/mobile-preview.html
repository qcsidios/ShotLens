<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ShotLens 商品图 · 手机阅读预览</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 28px 18px 60px; background: #e9eaec; color: #17191b; font-family: -apple-system, "SF Pro Text", "PingFang SC", sans-serif; }
    header { width: min(100%, 430px); margin: 0 auto 24px; }
    h1 { margin: 0; font-size: 22px; }
    p { margin: 8px 0 0; color: #656a6f; font-size: 14px; line-height: 1.55; }
    section { width: min(100%, 430px); margin: 0 auto 30px; }
    h2 { margin: 0 0 12px; font-size: 15px; }
    .cart-row { display: flex; align-items: center; gap: 12px; padding: 14px; background: white; border-radius: 12px; }
    .cart-row img { width: 64px; height: 64px; border-radius: 10px; }
    .cart-row strong { display: block; font-size: 16px; }
    .cart-row span { display: block; margin-top: 5px; color: #73787d; font-size: 13px; }
    .carousel { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 8px; }
    .carousel img { width: 100%; flex: 0 0 100%; height: auto; display: block; scroll-snap-align: start; }
  </style>
</head>
<body>
  <header>
    <h1>手机商品页阅读校验</h1>
    <p>主图按购物车约 64px 尺寸显示；轮播图按手机内容区宽度显示，可左右滑动。</p>
  </header>
  <section>
    <h2>购物车缩略图</h2>
    <div class="cart-row"><img src="exports/00.png" alt="ShotLens 商品主图"><div><strong>ShotLens 截图翻译</strong><span>一次购买，无订阅费</span></div></div>
  </section>
  <section>
    <h2>商品轮播（首图 1:1，其余 3:4）</h2>
    <div class="carousel">
      <img src="exports/01.png" alt="1:1 轮播封面">
      <img src="exports/02.png" alt="原位翻译">
      <img src="exports/03.png" alt="三步使用">
      <img src="exports/04.png" alt="使用场景">
      <img src="exports/05.png" alt="阅读收益">
      <img src="exports/06.png" alt="控制台界面">
      <img src="exports/07.png" alt="结果操作">
      <img src="exports/08.png" alt="隐私与 API">
      <img src="exports/09.png" alt="购买说明">
    </div>
  </section>
</body>
</html>
